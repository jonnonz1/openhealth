name: Feature request
description: Suggest a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing pain, not the implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Sketches, example CLI invocations, or UI flow are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the client-side, no-server architecture
          required: true
        - label: This does not require telemetry, analytics, or outbound network calls
          required: true
